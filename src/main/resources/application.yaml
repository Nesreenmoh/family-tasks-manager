spring:
  security:
    debug: true
    user:
      name: admin
      password: admin

  application:
    name: family-task-app
  datasource:
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
    url: jdbc:postgresql://localhost:5432/family_task_manager
    hikari:
      maximum-pool-size: 10

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http:server.requests: true
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: jaeger_remote_sampler
  logging:
    pattern:
      level: "%5p [traceId=%X{traceId}, spanId=%X{spanId}]"
  otlp:
    tracing:
      endpoint: http://localhost:4317
      timeout: 30s
